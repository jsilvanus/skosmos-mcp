services:
  skosmos-mcp:
    image: ghcr.io/jsilvanus/skosmos-mcp:stdio-latest
    environment:
      SKOSMOS_BASE_URL: ${SKOSMOS_BASE_URL:-https://api.finto.fi}
      SKOSMOS_DEFAULT_VOCABULARY: ${SKOSMOS_DEFAULT_VOCABULARY:-}
      SKOSMOS_DEFAULT_LANGUAGE: ${SKOSMOS_DEFAULT_LANGUAGE:-en}
      SKOSMOS_TIMEOUT: ${SKOSMOS_TIMEOUT:-30000}
      SKOSMOS_CACHE_TTL: ${SKOSMOS_CACHE_TTL:-300}
      SKOSMOS_MAX_TRAVERSAL_DEPTH: ${SKOSMOS_MAX_TRAVERSAL_DEPTH:-5}
      SKOSMOS_TOOL_SERVER_URL_ALLOWED: ${SKOSMOS_TOOL_SERVER_URL_ALLOWED:-true}
      SPARQL_ENDPOINT_URL: ${SPARQL_ENDPOINT_URL:-}
      SPARQL_ALLOW_OTHER_ENDPOINTS: ${SPARQL_ALLOW_OTHER_ENDPOINTS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    stdin_open: true
    tty: false
