services:
  skosmos-mcp:
    build:
      context: .
      target: http
    image: skosmos-mcp:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3000
      SKOSMOS_TOOL_SERVER_URL_ALLOWED: "true"
      SPARQL_ALLOW_OTHER_ENDPOINTS: "true"
    ports:
      - "3020:3000"

  skosmos-mcp-stdio:
    build:
      context: .
      target: stdio
    image: skosmos-mcp:stdio-latest
    env_file:
      - .env
    environment:
      SKOSMOS_TOOL_SERVER_URL_ALLOWED: "true"
      SPARQL_ALLOW_OTHER_ENDPOINTS: "true"
    stdin_open: true
    tty: false
